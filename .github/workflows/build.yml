name: Build and Push FEX Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Runtime metadata
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Extract Docker Installer metadata
        id: meta-installer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-installer

      # Build the Runtime (pointing to the 'runtime' stage)
      - name: Build Runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime  # <--- This tells Docker to stop at the runtime stage
          push: true
          tags: ${{ steps.meta-runtime.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build the Installer (pointing to the 'installer' stage)
      - name: Build Installer
        uses: docker/build-push-action@v5
        with:
          context: .
          target: installer # <--- This tells Docker to stop at the installer stage
          push: true
          tags: ${{ steps.meta-installer.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
